<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1830"/>
      <stop offset="100%" stop-color="#080610"/>
    </linearGradient>
    <linearGradient id="beam" x1="0.85" y1="0.05" x2="0.2" y2="0.95">
      <stop offset="0%"   stop-color="#FFE040" stop-opacity="1"/>
      <stop offset="45%"  stop-color="#FFAA00" stop-opacity="0.76"/>
      <stop offset="100%" stop-color="#FF7800" stop-opacity="0.08"/>
    </linearGradient>
    <radialGradient id="pool" cx="43%" cy="45%" r="52%">
      <stop offset="0%"   stop-color="#FFE040" stop-opacity="0.52"/>
      <stop offset="100%" stop-color="#FF9000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lens" cx="38%" cy="34%" r="58%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="30%"  stop-color="#FFF59D"/>
      <stop offset="100%" stop-color="#FFB300"/>
    </radialGradient>
    <filter id="softBeam" x="-10%" y="-5%" width="120%" height="110%">
      <feGaussianBlur stdDeviation="11"/>
    </filter>
    <filter id="lensGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="frame">
      <rect width="512" height="512" rx="108"/>
    </clipPath>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <g clip-path="url(#frame)">
    <polygon points="350,82 406,58 465,540 28,540"
      fill="url(#beam)" filter="url(#softBeam)" opacity="0.55"/>
    <polygon points="350,82 406,58 465,540 28,540"
      fill="url(#beam)" opacity="0.9"/>
    <ellipse cx="246" cy="490" rx="216" ry="44" fill="url(#pool)"/>
    <rect x="402" y="14" width="16" height="60" rx="7" fill="#28263c"/>
    <circle cx="410" cy="13" r="12" fill="#32304a"/>
    <circle cx="410" cy="13" r="6"  fill="#1e1c2e"/>
    <g transform="translate(358,74) rotate(-14)">
      <rect x="-58" y="-25" width="118" height="50" rx="15" fill="#201e36"/>
      <rect x="-44" y="-21" width="82" height="9" rx="5" fill="#3c3a58" opacity="0.8"/>
      <rect x="-44" y="14"  width="82" height="8" rx="4" fill="#0e0c1e" opacity="0.5"/>
      <circle cx="50"  cy="-10" r="5" fill="#2e2c46"/>
      <circle cx="50"  cy="10"  r="5" fill="#2e2c46"/>
      <circle cx="-50" cy="0" r="27" fill="#14122a"/>
      <circle cx="-50" cy="0" r="22" fill="url(#lens)" filter="url(#lensGlow)"/>
      <ellipse cx="-56" cy="-7" rx="8" ry="6" fill="#ffffff" opacity="0.5" transform="rotate(-20 -56 -7)"/>
    </g>
  </g>
</svg>
